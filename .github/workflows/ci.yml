name: VectorBox CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Frontend Quality (cada push, ~2min)
  # ─────────────────────────────────────────
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Security audit
        run: pnpm audit

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          BACKEND_URL: http://localhost:8000
          NEXT_TELEMETRY_DISABLED: 1

  # ─────────────────────────────────────────
  # JOB 2: Backend Scripts (cada push master/PR)
  # ─────────────────────────────────────────
  backend-scripts:
    name: Backend Verification Scripts
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vectorbox
          POSTGRES_USER: vectorbox_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install backend dependencies (sin torch)
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt --ignore-requires-python \
            || pip install fastapi uvicorn sqlalchemy asyncpg \
               redis qdrant-client pydantic python-multipart \
               slowapi httpx aiohttp

      - name: Run security audit
        working-directory: backend
        run: python scripts/security_audit.py

      - name: Run Trident math verification
        working-directory: backend
        run: python scripts/test_trident_math.py

      - name: Run feed parallelism verification
        working-directory: backend
        run: python scripts/verify_feed_parallelism.py

      - name: Run ES whitelist test
        working-directory: backend
        run: python scripts/test_es_whitelist.py

      # Requires live DB — run manually via docker compose
      # - python scripts/test_idor_hidden_gems.py
      # - python scripts/verify_nlp_fallback.py

  # ─────────────────────────────────────────
  # JOB 3: Playwright E2E (solo PRs a master)
  # ─────────────────────────────────────────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [frontend-quality, backend-scripts]

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af

      - name: Checkout
        uses: actions/checkout@v6

      - name: Create .env for CI
        run: |
          # ── Credentials ──────────────────────────────────────────────
          # POSTGRES_PASSWORD must match what docker-compose passes to
          # the postgres container (default: change_me_in_prod).
          # We set it explicitly here so there is never any ambiguity.
          POSTGRES_PASSWORD="change_me_in_prod"
          DB_URL="postgresql+asyncpg://vectorbox_user:${POSTGRES_PASSWORD}@postgres:5432/vectorbox"

          cat > .env <<EOF
          ENVIRONMENT=development
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=${DB_URL}
          REDIS_URL=redis://redis:6379
          QDRANT_URL=http://qdrant:6333
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          TMDB_READ_TOKEN=${{ secrets.TMDB_READ_TOKEN }}
          OMDB_API_KEY=${{ secrets.OMDB_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOF

          # Export to runner env so subsequent steps can read them too
          echo "DATABASE_URL=${DB_URL}"            >> $GITHUB_ENV
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"           >> $GITHUB_ENV
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"           >> $GITHUB_ENV
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}"       >> $GITHUB_ENV
          echo "TMDB_READ_TOKEN=${{ secrets.TMDB_READ_TOKEN }}" >> $GITHUB_ENV
          echo "OMDB_API_KEY=${{ secrets.OMDB_API_KEY }}"       >> $GITHUB_ENV
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"       >> $GITHUB_ENV

      - name: Create auth directory
        run: mkdir -p frontend/e2e/.auth

      - name: Start services
        run: docker compose --env-file .env up -d --build

      - name: Wait for postgres
        run: |
          echo "Waiting for postgres to be ready..."
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U vectorbox_user -d vectorbox; then
              echo "Postgres is READY!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
          echo "ERROR: Postgres never became ready — aborting."
          docker compose logs postgres
          exit 1

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend API..."
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "ERROR: Backend never became healthy — dumping logs."
          docker compose logs backend
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run Alembic migrations
        run: |
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T backend alembic current

      - name: Verify DB tables exist
        # Guard: if migrations silently did nothing, catch it here
        # before the seed script fails with a cryptic UndefinedTableError.
        run: |
          docker compose exec -T backend python - <<'EOF'
          import asyncio, sys, os
          from sqlalchemy.ext.asyncio import create_async_engine
          from sqlalchemy import text

          async def check():
              url = os.environ["DATABASE_URL"]
              engine = create_async_engine(url)
              async with engine.connect() as conn:
                  result = await conn.execute(
                      text("SELECT tablename FROM pg_tables WHERE schemaname='public'")
                  )
                  tables = [r[0] for r in result.fetchall()]
              await engine.dispose()
              print(f"Tables found: {tables}")
              if "users" not in tables:
                  print("ERROR: 'users' table missing — migrations did not apply!")
                  sys.exit(1)
              print("OK: required tables are present.")

          asyncio.run(check())
          EOF

      - name: Seed QA user
        run: docker compose exec -T backend python scripts/seed_qa_user.py

      - name: Flush Redis
        # Clear any partial prefetches/SSR cache that might have leaked before seed
        run: docker compose exec -T redis redis-cli flushall

      - name: Warm up feed cache (Smoke Test)
        # Polling the feed until it returns >= 3 sections.
        # This ensures the recommendation model is "hot" and serves as a smoke test.
        run: |
          echo "Warming up feed for qa_vecbox..."
          docker compose exec -T backend python - <<'EOF'
          import httpx, time, sys

          LOGIN_URL = "http://localhost:8000/api/auth/login"
          FEED_URL = "http://localhost:8000/api/recommendations/feed"
          
          # Login to get session
          client = httpx.Client()
          login_resp = client.post(
              LOGIN_URL,
              json={"username": "qa_vecbox", "pin": "1234"}
          )
          if login_resp.status_code != 200:
              print(f"ERROR: Login failed ({login_resp.status_code})")
              print(f"Response: {login_resp.text}")
              sys.exit(1)

          user_data = login_resp.json()
          user_id = user_data["user_id"]
          print(f"Logged in as {user_data['username']} (id={user_id})")

          # Polling loop
          for i in range(24): # 2 mins max (5s * 24)
              resp = client.get(FEED_URL)
              if resp.status_code == 200:
                  data = resp.json()
                  sections = len(data.get("feed", []))
                  print(f"Warmup check {i+1}/24: {sections} sections found")
                  if sections >= 3:
                      print("SUCCESS: Feed is hot and caching guard passed.")
                      sys.exit(0)
              else:
                  print(f"Warmup status: {resp.status_code}")
              time.sleep(5)

          print("ERROR: Feed never reached richness threshold (>=3 sections).")
          sys.exit(1)
          EOF

      - name: Run Playwright suite
        working-directory: frontend
        run: pnpm exec playwright test --reporter=list --timeout=60000
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.1
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v

# Required GitHub Secrets (Settings → Secrets → Actions):
# - SECRET_KEY
# - JWT_SECRET
# - TMDB_API_KEY
# - TMDB_READ_TOKEN
# - OMDB_API_KEY
# - GROQ_API_KEY
#
# Add via: GitHub repo → Settings → Secrets and variables
#           → Actions → New repository secret