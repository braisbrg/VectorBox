version: 2
updates:
  # 1. Docker - Check for base image updates (postgres, python-slim)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # 2. Frontend - NPM ecosystem (handles pnpm-lock.yaml)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    # Group non-security updates to avoid noise
    groups:
      dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  # 3. Backend - PIP ecosystem (handles requirements.txt)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 10
