version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      infrastructure-critical:
        patterns:
          - "fastapi"
          - "sqlalchemy"
          - "redis"
          - "psycopg"
          - "psycopg2-binary"
          - "alembic"
          - "bcrypt"
          - "cryptography"
          - "pyjwt"
          - "sentence-transformers"
          - "scikit-learn"
          - "qdrant-client"
          - "opentelemetry-*"
        update-types:
          - "minor"
          - "patch"
      security-deps:
        patterns:
          - "bcrypt"
          - "cryptography"
          - "pyjwt"
          - "pip-audit"
        update-types:
          - "minor"
          - "patch"
      dev-tools:
        patterns:
          - "pytest"
          - "pytest-asyncio"
          - "pip-audit"
          - "tqdm"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "fastapi"
        versions: [">=1"]
      - dependency-name: "fastapi[all]"
        versions: [">=1"]
      - dependency-name: "pandas"
        versions: [">=3"]
      - dependency-name: "sentence-transformers"
        versions: [">=4"]
      - dependency-name: "redis"
        versions: [">=5"]
      - dependency-name: "bcrypt"
        versions: [">=5"]
      - dependency-name: "groq"
        versions: [">=1"]
      - dependency-name: "openai"
        versions: [">=3"]
      - dependency-name: "curl-cffi"
        versions: [">=1"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      frontend-ui:
        patterns:
          - "lucide-react"
          - "tailwindcss"
          - "tailwind-merge"
          - "@tailwindcss/postcss"
          - "postcss"
          - "framer-motion"
        update-types:
          - "minor"
          - "patch"
      frontend-core:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "axios"
          - "@tanstack/react-query"
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      frontend-devtools:
        patterns:
          - "eslint"
          - "lint-staged"
          - "prettier"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "eslint"
        versions: [">=10"]