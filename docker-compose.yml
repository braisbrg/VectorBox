# Development only — do NOT use in production.
# For production, use: docker-compose -f docker-compose.yml
#                                     -f docker-compose.prod.yml up

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vectorbox-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vectorbox}
      POSTGRES_USER: ${POSTGRES_USER:-vectorbox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
    # Security: Ports removed for production (internal access only)
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorbox_user -d vectorbox"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vectorbox-qdrant
    # Security: Ports removed for production (internal access only)
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vectorbox-redis
    # Security: Ports removed for production (internal access only)
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Observability: Jaeger All-in-One (Tracing UI + OTLP Collector)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: vectorbox-jaeger
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:4317:4317"    # OTLP gRPC receiver
      - "127.0.0.1:4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectorbox-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://vectorbox_user:change_me_in_prod@postgres:5432/vectorbox}
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_READ_TOKEN=${TMDB_READ_TOKEN}
      - DEFAULT_COUNTRY=ES
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY}
      # Observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=vectorbox-backend
      - PIP_CONFIG_FILE=/app/pip.conf
      - TESTING_MODE=True
    volumes:
      - ./backend:/app
      - ./backups:/app/backups
      - models_cache:/models_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      jaeger:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vectorbox-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  models_cache:
