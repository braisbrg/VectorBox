[global]
# Release age policy (differentiated rules in .github/dependabot.yml)
# Infrastructure/ML: 1440h (60 days)
# Security patches:   168h  (7 days)
# Dev tools:          168h  (7 days)
# Frontend UI:        168h  (7 days)
# Effective global minimum for pip installs:
minimum-release-age = 720
# 720h = 30 days — balanced default
# Per-package rules enforced at PR level via Dependabot
